<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arsip Digital Desa Baleharjo</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <h1>Arsip Digital</h1>
      <p>Kaup Perencanaan Desa Baleharjo</p>
      <span>Admin : REDI</span>
    </div>

    <nav class="menu">
      <button class="menu-btn active" onclick="showPage('dashboard')">Dashboard</button>
      <button class="menu-btn" onclick="showPage('rpjm')">RPJMDes</button>
      <button class="menu-btn" onclick="showPage('rkp')">RKPDes</button>
      <button class="menu-btn" onclick="showPage('apb')">APBDes</button>
    </nav>
  </aside>

  <!-- Content -->
  <main class="content">

    <!-- Dashboard -->
    <section id="dashboard" class="page active-page">
      <h2>Dashboard Arsip Desa</h2>

      <div class="stats">
        <div class="card">
          <h3>RPJMDes</h3>
          <p>Dokumen dan Foto Kegiatan</p>
        </div>

        <div class="card">
          <h3>RKPDes</h3>
          <p>Dokumen dan Foto Kegiatan</p>
        </div>

        <div class="card">
          <h3>APBDes</h3>
          <p>Dokumen dan Foto Kegiatan</p>
        </div>
      </div>
    </section>

    <!-- RPJM -->
    <section id="rpjm" class="page">
      <h2>RPJMDes</h2>

      <div id="rpjm-container"></div>
    </section>

    <!-- RKP -->
    <section id="rkp" class="page">
      <h2>RKPDes</h2>

      <div id="rkp-container"></div>
    </section>

    <!-- APB -->
    <section id="apb" class="page">
      <h2>APBDes</h2>

      <div id="apb-container"></div>
    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
